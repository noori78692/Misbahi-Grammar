kind = "web"
previewPath = "/"
title = "English Grammar Course"
version = "1.0.0"
id = "artifacts/grammar-course"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21474

[services.development]
run = "pnpm --filter @workspace/grammar-course run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grammar-course", "run", "build" ]
publicDir = "artifacts/grammar-course/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21474"
BASE_PATH = "/"
