name: Build Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/grammar-course

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_FILE: ${{ github.workspace }}/artifacts/grammar-course/android/app/misbahi-release.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        run: pnpm build

      - name: Sync Android
        run: pnpm exec cap sync android

      - name: Restore Keystore
  shell: bash
  run: |
    printf '%s' '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/misbahi-release.jks
    ls -lh android/app/misbahi-release.jks

      - name: Build Debug APK
        working-directory: artifacts/grammar-course/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: artifacts/grammar-course/android
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        working-directory: artifacts/grammar-course/android
        run: ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: artifacts/grammar-course/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: artifacts/grammar-course/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: artifacts/grammar-course/android/app/build/outputs/bundle/release/app-release.aab